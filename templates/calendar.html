{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">Календарь заказов</div>
    <div class="card-body">
        <input type="date" id="calDate" class="form-control w-50 d-inline">
        <button class="btn btn-primary" id="showOrdersBtn">Показать</button>
        <div class="mt-3" id="dailyOrders"></div>
    </div>
</div>
<script>
    document.getElementById('showOrdersBtn')?.addEventListener('click', async () => {
        const date = document.getElementById('calDate').value;
        if(!date) return;
        const res = await fetch(`/api/daily-orders?date=${date}`);
        const orders = await res.json();
        const container = document.getElementById('dailyOrders');
        if(orders.length === 0) {
            container.innerHTML = '<p>Нет заказов за этот день</p>';
            return;
        }
        let html = '<ul class="list-group">';
        orders.forEach(o => {
            html += `<li class="list-group-item">Заказ #${o.id}: ${o.customer_name}, ${o.device_model}, ${o.price}₽, статус: ${o.status}</li>`;
        });
        html += '</ul>';
        container.innerHTML = html;
    });
</script>
{% endblock %}
