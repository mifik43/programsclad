{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">⚙️ Настройки системы</div>
    <div class="card-body">
        <label>Процент мастеру от стоимости ремонта (%) :</label>
        <input type="number" id="masterPercent" class="form-control w-25 mb-2" value="67">
        <label>Бонус/штраф за скорость (дни) :</label>
        <input type="number" id="bonusDays" class="form-control w-25 mb-2" value="3">
        <label>Размер бонуса/штрафа (%) :</label>
        <input type="number" id="bonusPercent" class="form-control w-25 mb-2" value="10">
        {% if current_user.role == 'admin' %}
        <hr>
        <button class="btn btn-warning" id="resetDemoBtn">Сбросить демо-данные</button>
        {% endif %}
        <p class="mt-3 text-muted small">Настройки используются при завершении заказов.</p>
    </div>
</div>
<script>
    {% if current_user.role == 'admin' %}
    document.getElementById('resetDemoBtn')?.addEventListener('click', async () => {
        if(confirm('Сбросить все данные (кроме пользователей)?')) {
            const res = await fetch('/api/reset-demo', {method: 'POST'});
            const data = await res.json();
            alert(data.message);
        }
    });
    {% endif %}
</script>
{% endblock %}
